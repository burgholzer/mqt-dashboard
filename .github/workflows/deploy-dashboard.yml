name: Deploy dashboard

on:
  push:
    branches: [main]
  schedule:
    # 05:00 CET (06:00 CEST) -- GitHub Actions schedules use UTC.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv sync --locked
      - name: Collect dashboard data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}
        run: uv run mqt-dashboard-collection
      - name: Build static site
        run: uv run mqt-dashboard-build --output site
      - name: Publish GitHub Pages site
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: site
          clean: true
          clean-exclude: pr-preview
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
