name: Deploy pull request preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    # Forks do not receive repository secrets or a write-capable GITHUB_TOKEN.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        if: github.event.action != 'closed'
      - run: uv sync --locked
        if: github.event.action != 'closed'
      - name: Collect dashboard data
        if: github.event.action != 'closed'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}
        run: uv run mqt-dashboard-collection
      - name: Build static site
        if: github.event.action != 'closed'
        run: uv run mqt-dashboard-build --output site
      - name: Publish or remove preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: site
          preview-branch: gh-pages
          wait-for-pages-deployment: true
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
